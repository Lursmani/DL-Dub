# GUI at http://localhost:7861 after `docker compose up gui`.
# (The full project uses port 7861 everywhere; lite uses 7860, so both GUIs
# can run alongside each other.)
#
# Prereqs (one-time, on the host, in this directory):
#   cp .env.example .env                # fill in the API keys
#   cp config.example.yaml config.yaml
#
#   docker compose up gui               # full image: local ML stages included
#
# CLI instead of the GUI:
#   docker compose run --rm gui python dub.py estimate input/episode.mp4
#
# No-ML image for the hybrid workflow (Analyze in Colab):
#   docker build --target core -t dub-full:core .

services:
  gui:
    build:
      context: .
      # For NVIDIA hosts, build GPU torch wheels instead of CPU:
      # args:
      #   TORCH_CHANNEL: cu126
    image: dub-full
    ports:
      - "7861:7861"
    env_file: .env
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./work:/app/work
      - ./input:/app/input
      - ./output:/app/output
      # Whisper/pyannote/Demucs weights (~4 GB) download once into this volume.
      - model-cache:/cache
    # For NVIDIA hosts (needs the NVIDIA Container Toolkit + the cu126 build):
    # gpus: all

volumes:
  model-cache:
